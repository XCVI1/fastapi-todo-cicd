name: CI/CD with flake, test, build and deploy.

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run flake8
        run: |
          pip install flake8
          flake8 app/

  pytest:
    runs-on: ubuntu-latest
    needs: flake
    strategy:
      matrix:
        python-version: [3.9, 3.11, 3.12]
    steps:
      - uses: actions/checkout@v6

      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys:
            ${{ runner.os }}-pip-

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v6

      - name: Login to docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker image tag
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF_TYPE == tag ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:${{steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if ! command -v docker &>/dev/null; then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
            fi
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest
            docker stop todo-api-staging || true
            docker rm todo-api-staging || true
            docker run -d --name todo-api-staging -p 8080:8000 ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startswith(github.ref, 'refs/tags/')
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if ! command -v docker &>/dev/null; then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
            fi
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:${{ github.ref_name }}
            docker stop todo-api-production || true
            docker rm todo-api-production || true
            docker run -d --name todo-api-production -p 8090:8000 ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:${{ github.ref_name }}
